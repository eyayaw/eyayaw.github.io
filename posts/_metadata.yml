# options specified here will apply to all posts in this folder

# freeze computational output (see https://quarto.org/docs/projects/code-execution.html#freeze)
freeze: auto
title-block-banner: false
smooth-scroll: true
# Default author
author:
  - name: Eyayaw Beze
    url: "{{< var github >}}"
    affiliation: "{{< var ude-name >}}"
    affiliation-url: "{{< var ude-url >}}"
citation: true
toc: true
toc-title: Contents
highlight-style: solarized
code-copy: true
code-overflow: wrap
